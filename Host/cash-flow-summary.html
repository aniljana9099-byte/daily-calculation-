<body>

    <div class="container">

            <button type="button" class="action-btn" onclick="downloadCashFlowCSV()" style="background:rgba(5,150,105,0.15);color:var(--success);border:1px solid rgba(5,150,105,0.3)" title="Export all balances to CSV file">📥 Export CSV</button>
            <button type="button" class="action-btn" onclick="clearAllAmounts()" style="background:rgba(220,38,38,0.1);color:var(--danger);border:1px solid rgba(220,38,38,0.3)" title="Clear all amount fields">🗑 Clear Amounts</button>
            <button type="button" class="action-btn" onclick="deleteAllData()" style="background:rgba(127,29,29,0.12);color:#991b1b;border:1px solid rgba(220,38,38,0.4)" title="Remove all saved data and start fresh">🗑 Delete All</button>
            <button type="button" class="action-btn save" onclick="window.print()" style="background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff">🖨 Print</button>
        </div>
        <div id="tableWrap"></div>
    </div>
    <div id="toast" class="toast">✓ Saved!</div>
    <script>
        const API_URL = (window.location.origin && window.location.origin.startsWith('http')) ? window.location.origin : 'http://localhost:5000';
        const STORAGE_KEY = 'cashFlowSummary';
        const BANK_OPTS = [
            { key: '8a', name: 'Lexiroof Union Bank', short: 'L-Union' },
            { key: '8b', name: 'Lexiroof SBI', short: 'L-SBI' },
            { key: '8c', name: 'Lexiroof Axis', short: 'L-Axis' },
            { key: '8d', name: 'Lexiroof Indusind', short: 'L-Indus' },
            { key: '8e', name: 'Lexiroof Kotak', short: 'L-Kotak' },
            { key: '8f', name: 'Lexiroof HDFC', short: 'L-HDFC' },
            { key: '8g', name: 'Epocketpay Axis', short: 'E-Axis' },
            { key: '8h', name: 'Epocketpay BOI', short: 'E-BOI' },
            { key: '8i', name: 'DIG Indusind', short: 'DIG' }
        ];
        const GATEWAY_OPTS = [
            { key: '1b', name: 'Pocketpay Busybox' },
            { key: '2b', name: 'Lexi Busybox' },
            { key: '3b', name: 'PocketPay Nixa' },
            { key: '4b', name: 'Lexi Nixa' },
            { key: '5', name: 'Finkin Lexi' },
            { key: '6', name: 'Finkin PocketPay' },
            { key: '7', name: 'Finkin Dig' }

        const USER_ITEMS = [
            { key: 'gatewaytest', name: 'GATEWAYTEST' },
            { key: 'royal_pay', name: 'ROYAL PAY' },
            { key: 'gmr_international', name: 'GMR INTERNATIONAL GROUP LTD' },
            { key: 'binance_autopay', name: 'BINANCE AUTOPAY' },
            { key: 'minex', name: 'MINEX' },
            { key: 'einpays', name: 'EINPAYS' },
            { key: 'flavourfimly', name: 'FLAVOUR FAMILY' },
            { key: 'atps_global', name: 'ATPS GLOBAL PRIVATE LIMITED' },
            { key: 'zora_fintech', name: 'ZORA FINTECH LLC' }
        ];
        const DEFAULT_USEABLE_KEYS = ['royal_pay', 'gmr_international', 'einpays'];
        function formatNum(n) {
            if (n === null || n === undefined || n === '') return '0';
            const val = typeof n === 'string' ? parseNum(n) : Number(n);
            if (isNaN(val)) return '0';
            const fixed = val.toFixed(2);
            return fixed.endsWith('.00') ? String(Math.round(val)) : fixed;
        }
        function parseNum(val) {
            if (val === null || val === undefined) return 0;
            let s = String(val).trim().replace(/\s/g, '');
            if (!s) return 0;
            // Remove commas - Indian (3,57,228) & US (357,228) format
            s = s.replace(/,/g, '');
            // Dot as thousand separator only when 3 digits after (European): 49.500=49500. Keep .XX as decimal (277673.72)
            if (/^\d{1,}\.\d{3}$/.test(s)) {
                s = s.replace('.', '');
            }
            const n = parseFloat(s);
            return isNaN(n) ? 0 : n;
        }
        function defaultMaint(amt) {
            const a = parseNum(amt);
            return a >= 100000 ? '1,00,000' : (a > 0 ? formatNum(a) : '0');
        }
        function getData() {
            try {
                return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
            } catch (e) { return {}; }
        }
        function saveToStorage(data) {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
                return true;
            } catch (e) { return false; }
        }
        function syncServerQuiet(d) {
            fetch(API_URL + '/api/cash-flow-data', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ data: d })
            }).catch(function() {});
        }
        function pushDataToServer(d) {
            return fetch(API_URL + '/api/cash-flow-data', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ data: d })
            });
        }
        function showToast(msg, isError) {
            const t = document.getElementById('toast');
            t.textContent = msg || (isError ? 'Error occurred' : 'Saved successfully');
            t.classList.toggle('toast-error', !!isError);
            t.classList.add('show');
            clearTimeout(t._toastTimer);
            t._toastTimer = setTimeout(function() { t.classList.remove('show'); t.classList.remove('toast-error'); }, 2200);
        }
        async function pullFromServer() {
            try {
                const r = await fetch(API_URL + '/api/cash-flow-data');
                const j = await r.json();
                if (j && j.ok && j.data && typeof j.data === 'object' && Object.keys(j.data).length > 0) {
                    saveToStorage(j.data);
                }
            } catch (e) { /* offline / MySQL band */ }
        }
        async function reloadFromServer() {
            await pullFromServer();
            loadData();
            showToast('Data reloaded');
        }
        async function loadData() {
            const saved = getData();
            let html = '';
            let totalBank = 0, totalGateway = 0, totalUser = 0;
            var idx = 1;
            function rowBank(opt, name, amt, noteKey) {
                const amtNum = parseNum(amt);
                const hasNote = saved[noteKey] !== undefined && saved[noteKey] !== '' && !(amtNum > 0 && (saved[noteKey] === '0' || saved[noteKey] === 0));
                const note = hasNote ? saved[noteKey] : defaultMaint(amtNum);
                const maintNum = parseNum(note);
                const netBal = Math.round((amtNum - maintNum) * 100) / 100;
                return '<tr><td class="col-sno">' + (idx++) + '</td><td class="col-name">' + name + '</td><td class="col-amount"><input type="text" inputmode="decimal" data-key="' + opt + '" value="' + formatNum(saved[opt] !== undefined && saved[opt] !== '' ? amt : 0) + '" onchange="updateAmt(this)" oninput="updateRowNetBalance(this.closest(\'tr\'))"></td><td class="col-note"><input type="text" data-key="' + noteKey + '" value="' + note + '" onchange="updateNote(this)" oninput="updateRowNetBalance(this.closest(\'tr\'))" placeholder="Maintenance balance"></td><td class="col-net-balance"><input type="text" class="net-balance-inp" value="' + formatNum(netBal) + '" readonly tabindex="-1"></td></tr>';
            }
            function rowGateway(opt, name, amt) {
                return '<tr><td class="col-sno">' + (idx++) + '</td><td class="col-name">' + name + '</td><td class="col-amount"><input type="text" inputmode="decimal" data-key="' + opt + '" value="' + formatNum(saved[opt] !== undefined && saved[opt] !== '' ? amt : 0) + '" onchange="updateAmt(this)" oninput="recalcTotals()"></td></tr>';
            }
            const bankDatalistOpts = BANK_OPTS.map(m => '<option value="' + (m.name || '').replace(/"/g, '&quot;') + '"></option>').join('');
            html += '<div class="section-card"><div class="section-header-row"><span class="section-title">1) Bank Balance</span><div class="section-img-upload" id="screenshotZone" title="Bank balance"><div class="bank-select-wrap"><input type="text" class="bank-dropdown" id="bankSelectInput" list="bankList" placeholder="Select bank" autocomplete="off" title="Type to search"><button type="button" class="bank-clear-btn" onclick="event.stopPropagation(); clearBankSelect()" title="Clear selection">×</button><span class="bank-arrow">▾</span><datalist id="bankList">' + bankDatalistOpts + '</datalist></div><input type="hidden" id="bankSelectKey"><input type="file" id="screenshotInput" accept="image/png,image/jpeg,image/jpg,image/webp" multiple onchange="handleScreenshotSelect(event,\'1\')"><span onclick="document.getElementById(\'screenshotInput\').click()" title="Select one or multiple screenshots">📷 Upload</span><button type="button" class="img-paste-btn" onclick="event.stopPropagation(); pasteScreenshot(\'1\')" title="Copy from Snipping Tool and paste here">Paste</button><button type="button" class="img-submit-btn" id="submitBankBtn" onclick="event.stopPropagation(); submitBankFromScreenshot()" title="Extract balance from screenshot and add to selected bank">Submit</button><button type="button" class="img-delete-btn" onclick="event.stopPropagation(); clearAllBankAmounts()" title="Clear all bank amounts">Delete</button><div class="bank-quick-select">' + BANK_OPTS.map(b => '<button type="button" class="bank-quick-btn" onclick="selectQuickBank(\'' + b.key + '\')" title="' + (b.name || '').replace(/"/g, '&quot;') + '">' + (b.short || b.name) + '</button>').join('') + '</div></div></div><div class="screenshot-preview" id="screenshotPreview" style="display:none"><img id="screenshotImg" src="" alt=""><button type="button" class="clear-btn" onclick="clearScreenshot(\'1\')">Remove</button></div><div class="cf-table-wrap"><table class="cf-table"><thead><tr><th class="col-sno">#</th><th class="col-name"><span class="th-full">BANK NAME</span><span class="th-short">Bank</span></th><th class="col-amount">Amount</th><th class="col-note"><span class="th-full">Maintenance balance</span><span class="th-short">Maint. Bal</span></th><th class="col-net-balance"><span class="th-full">Net Balance</span><span class="th-short">Net</span></th></tr></thead><tbody>';
            idx = 1;
            for (const m of BANK_OPTS) {
                const amt = saved[m.key] !== undefined ? parseNum(saved[m.key]) : 0;
                totalBank += amt;
                html += rowBank(m.key, m.name, amt, m.key + '_note');
            }
            const bankCustoms = saved.custom_bank || [];
            let totalBankMaint = 0;
            bankCustoms.forEach((c, i) => {
                totalBank += parseNum(c.amount);
                const cAmt = parseNum(c.amount !== undefined && c.amount !== '' ? c.amount : 0);
                const cNote = (c.note !== undefined && c.note !== '' && !(parseNum(c.amount) > 0 && (c.note === '0' || c.note === 0))) ? c.note : defaultMaint(c.amount);
                const cNet = Math.round((cAmt - parseNum(cNote)) * 100) / 100;
                totalBankMaint += parseNum(cNote);
                html += '<tr><td class="col-sno">' + (idx++) + '</td><td class="col-name col-name-with-del"><input type="text" value="' + (c.name || '') + '" data-idx="' + i + '" data-type="bank" onchange="updateCustom(this)" placeholder="Bank name"><button type="button" class="btn-del" onclick="delCustom(' + i + ',\'bank\')">Delete</button></td><td class="col-amount"><input type="text" inputmode="decimal" value="' + formatNum(c.amount !== undefined && c.amount !== '' ? parseNum(c.amount) : 0) + '" data-idx="' + i + '" data-type="bank" onchange="updateCustomAmt(this)" oninput="updateRowNetBalance(this.closest(\'tr\'))"></td><td class="col-note"><input type="text" value="' + cNote + '" data-idx="' + i + '" data-type="bank" onchange="updateCustomNote(this)" oninput="updateRowNetBalance(this.closest(\'tr\'))" placeholder="Maintenance balance"></td><td class="col-net-balance"><input type="text" class="net-balance-inp" value="' + formatNum(cNet) + '" readonly tabindex="-1"></td></tr>';
            });
            BANK_OPTS.forEach(m => { const a = parseNum(saved[m.key]); const n = (saved[m.key + '_note'] !== undefined && saved[m.key + '_note'] !== '' && !(a > 0 && (saved[m.key + '_note'] === '0' || saved[m.key + '_note'] === 0))) ? saved[m.key + '_note'] : defaultMaint(a); totalBankMaint += parseNum(n); });
            html += '<tr class="row-total-bank"><td></td><td class="col-name">TOTAL BANK BALANCE</td><td class="col-amount" id="totalBankVal">' + formatNum(totalBank) + '</td><td></td><td class="col-net-balance"><input type="text" class="net-balance-inp net-balance-total" id="totalBankNetVal" value="' + formatNum(Math.round((totalBank - totalBankMaint) * 100) / 100) + '" readonly tabindex="-1"></td></tr></tbody></table></div><button type="button" class="add-row-btn" onclick="addCustomRow(\'bank\')">+ Add Bank</button></div>';
            html += '<div class="section-card"><div class="section-header-row"><span class="section-title">2) Gateway Balance</span><div class="section-img-upload" id="screenshotZone2" title="Gateway balance"><input type="file" id="screenshotInput2" accept="image/png,image/jpeg,image/jpg,image/webp" multiple onchange="handleScreenshotSelect(event,\'2\')"><span onclick="document.getElementById(\'screenshotInput2\').click()" title="Select one or multiple screenshots">📷 Upload</span><button type="button" class="img-paste-btn" onclick="event.stopPropagation(); pasteScreenshot(\'2\')" title="Copy from Snipping Tool and paste here">Paste</button><button type="button" class="img-submit-btn" id="submitGatewayBtn" onclick="event.stopPropagation(); submitGatewayFromScreenshot()" title="Match amounts from screenshot and add">Submit</button><button type="button" class="img-delete-btn" onclick="event.stopPropagation(); clearAllGatewayAmounts()" title="Clear all gateway amounts">Delete</button></div></div><div class="screenshot-preview" id="screenshotPreview2" style="display:none"><img id="screenshotImg2" src="" alt=""><button type="button" class="clear-btn" onclick="clearScreenshot(\'2\')">Remove</button></div><div class="cf-table-wrap"><table class="cf-table"><thead><tr><th class="col-sno">#</th><th class="col-name"><span class="th-full">GATEWAY NAME</span><span class="th-short">Gateway</span></th><th class="col-amount">Amount</th></tr></thead><tbody>';
            idx = 1;
            for (const m of GATEWAY_OPTS) {
                const amt = saved[m.key] !== undefined ? parseNum(saved[m.key]) : 0;
                totalGateway += amt;
                html += rowGateway(m.key, m.name, amt);
            }
            const gateCustoms = saved.custom_gateway || [];
            gateCustoms.forEach((c, i) => {
                totalGateway += parseNum(c.amount);
                html += '<tr><td class="col-sno">' + (idx++) + '</td><td class="col-name col-name-with-del"><input type="text" value="' + (c.name || '') + '" data-idx="' + i + '" data-type="gateway" onchange="updateCustom(this)" placeholder="Gateway name"><button type="button" class="btn-del" onclick="delCustom(' + i + ',\'gateway\')">Delete</button></td><td class="col-amount"><input type="text" inputmode="decimal" value="' + formatNum(c.amount !== undefined && c.amount !== '' ? parseNum(c.amount) : 0) + '" data-idx="' + i + '" data-type="gateway" onchange="updateCustomAmt(this)" oninput="recalcTotals()"></td></tr>';
            });
            html += '<tr class="row-total-gateway"><td></td><td class="col-name">TOTAL GATEWAY BALANCE</td><td class="col-amount" id="totalGatewayVal">' + formatNum(totalGateway) + '</td></tr></tbody></table></div><button type="button" class="add-row-btn" onclick="addCustomRow(\'gateway\')">+ Add Gateway</button></div>';
            html += '<div class="section-card"><div class="section-header-row"><span class="section-title">3) User Balance</span><div class="section-img-upload" id="screenshotZone3" title="User balance"><input type="file" id="screenshotInput3" accept="image/png,image/jpeg,image/jpg,image/webp" onchange="handleScreenshotSelect(event,\'3\')"><span onclick="document.getElementById(\'screenshotInput3\').click()" title="Select one or multiple screenshots">📷 Upload</span><button type="button" class="img-paste-btn" onclick="event.stopPropagation(); pasteScreenshot(\'3\')" title="Copy from Snipping Tool and paste here">Paste</button><button type="button" class="img-submit-btn" id="submitUserBtn" onclick="event.stopPropagation(); submitUserFromScreenshot()" title="Extract amounts from screenshot">Submit</button><button type="button" class="img-delete-btn" onclick="event.stopPropagation(); clearAllUserAmounts()" title="Clear all user amounts">Delete</button></div></div><div class="screenshot-preview" id="screenshotPreview3" style="display:none"><img id="screenshotImg3" src="" alt=""><button type="button" class="clear-btn" onclick="clearScreenshot(\'3\')">Remove</button></div><div class="cf-table-wrap"><table class="cf-table"><thead><tr><th class="col-sno">#</th><th class="col-name"><span class="th-full">USER</span><span class="th-short">User</span></th><th class="col-amount">Amount</th><th class="col-use"><span class="th-full">Use</span><span class="th-short">Use</span></th><th class="col-useable"><span class="th-full">Now Usable Balance</span><span class="th-short">Usable</span></th></tr></thead><tbody>';
            let totalUseable = 0;
            for (const o of USER_ITEMS) {
                const amt = saved[o.key] !== undefined ? parseNum(saved[o.key]) : 0;
                const useableOn = saved[o.key + '_useable_on'] === undefined ? DEFAULT_USEABLE_KEYS.includes(o.key) : (saved[o.key + '_useable_on'] === true || saved[o.key + '_useable_on'] === 'true');
                const useable = useableOn ? (saved[o.key + '_usable'] !== undefined && saved[o.key + '_usable'] !== '' ? parseNum(saved[o.key + '_usable']) : amt) : 0;
                totalUser += amt;
                totalUseable += useable;
                html += '<tr class="row-other"><td></td><td class="col-name">' + o.name + '</td><td class="col-amount"><input type="text" inputmode="decimal" data-key="' + o.key + '" value="' + formatNum(saved[o.key] !== undefined && saved[o.key] !== '' ? amt : 0) + '" onchange="updateAmt(this)" oninput="recalcTotals()"></td><td class="col-use"><label class="useable-check-wrap"><input type="checkbox" data-key="' + o.key + '_useable_on" ' + (useableOn ? 'checked' : '') + ' onchange="toggleUseable(this)"><span>Use</span></label></td><td class="col-useable"><input type="text" inputmode="decimal" data-key="' + o.key + '_usable" value="' + formatNum(useable) + '" ' + (useableOn ? '' : 'disabled') + ' onchange="updateAmt(this)" oninput="recalcTotals()"></td></tr>';
            }
            const extraAmt = saved.extra !== undefined ? parseNum(saved.extra) : 0;
            const extraUseableOn = saved.extra_useable_on === true || saved.extra_useable_on === 'true';
            const extraUseable = extraUseableOn ? (saved.extra_usable !== undefined && saved.extra_usable !== '' ? parseNum(saved.extra_usable) : extraAmt) : 0;
            totalUser += extraAmt;
            totalUseable += extraUseable;
            html += '<tr class="row-extra"><td></td><td class="col-name">Gear</td><td class="col-amount"><input type="text" inputmode="decimal" data-key="extra" value="' + formatNum(saved.extra !== undefined && saved.extra !== '' ? extraAmt : 0) + '" onchange="updateAmt(this)" oninput="recalcTotals()"></td><td class="col-use"><label class="useable-check-wrap"><input type="checkbox" data-key="extra_useable_on" ' + (extraUseableOn ? 'checked' : '') + ' onchange="toggleUseable(this)"><span>Use</span></label></td><td class="col-useable"><input type="text" inputmode="decimal" data-key="extra_usable" value="' + formatNum(extraUseable) + '" ' + (extraUseableOn ? '' : 'disabled') + ' onchange="updateAmt(this)" oninput="recalcTotals()"></td></tr>';
            html += '<tr class="row-total-user"><td></td><td class="col-name">TOTAL USER BALANCE</td><td class="col-amount" id="totalUserVal">' + formatNum(totalUser) + '</td><td class="col-use"></td><td class="col-useable" id="totalUserUseableVal">' + formatNum(totalUseable) + '</td></tr></tbody></table></div></div>';
            const grandTotal = totalBank + totalGateway + totalUser;
            html += '<div id="grandTotalEl" class="grand-total-box">GRAND TOTAL: ₹' + formatNum(grandTotal) + '</div>';
            document.getElementById('tableWrap').innerHTML = html;
            attachScreenshotDragDrop();
            attachBankSearch();
        }
        function attachBankSearch() {
            const inp = document.getElementById('bankSelectInput');
            const keyInp = document.getElementById('bankSelectKey');
            if (!inp || !keyInp) return;
            function syncKey() {
                const v = (inp.value || '').trim();
                const match = BANK_OPTS.find(m => m.name.toLowerCase() === v.toLowerCase());
                keyInp.value = match ? match.key : '';
            }
            inp.addEventListener('input', syncKey);
            inp.addEventListener('change', syncKey);
        }
        function toggleUseable(cb) {
            const d = getData();
            const key = cb.dataset.key;
            d[key] = cb.checked;
            const baseKey = key.replace('_useable_on', '');
            const row = cb.closest('tr');
            const amtInp = row ? row.querySelector('.col-amount input') : null;
            const useableInp = document.querySelector('.cf-table input[data-key="' + baseKey + '_usable"]');
            if (useableInp) {
                useableInp.disabled = !cb.checked;

        function parseBankBalanceFromOcr(ocrText) {

                if (/ledger\s*balance/i.test(lineLower) && amt != null) { ledgerBal = amt; continue; }

            const filtered = [...new Set(allAmounts)].filter(a => a !== 100000 && a !== parseNum('1,00,000')).sort((a,b) => a - b);
            if (filtered.length > 0) return filtered[filtered.length - 1];
            const loose = [...new Set(allAmounts)].filter(a => a >= 0.01).sort((a,b) => a - b);
            if (loose.length > 0) return loose[loose.length - 1];
            const global = scrapeAllMoneyCandidates(raw);
            const g2 = global.filter(
                n => n >= 1 && n < 1e14 && n !== 100000 && Math.round(n) !== 2023 && Math.round(n) !== 2024 && Math.round(n) !== 2025 && Math.round(n) !== 2026
            );
            if (g2.length === 0) return null;
            g2.sort((a,b) => a - b);
            const skipSmall = g2.filter(n => n >= 100);
            if (skipSmall.length) return skipSmall[skipSmall.length - 1];
            return g2[g2.length - 1];
        }
        async function submitGatewayFromScreenshot() {
            const fileInp = document.getElementById('screenshotInput2');
            const img = document.getElementById('screenshotImg2');
            const files = fileInp?.files;
            let toProcess = [];
            if (files && files.length > 0) {
                for (let i = 0; i < files.length; i++) {
                    if (files[i].type.startsWith('image/')) toProcess.push(files[i]);
                }
            } else if (img?.src?.startsWith('data:')) {
                toProcess.push(null);
            }
            if (toProcess.length === 0) {
                showToast('Upload or paste screenshot in Gateway section', true);
                return;
            }
            const btn = document.getElementById('submitGatewayBtn');
            if (btn) { btn.disabled = true; btn.textContent = 'Reading...'; }
            try {
                if (typeof Tesseract === 'undefined') {
                    showToast('OCR loading, please wait…', true);
                    return;
                }
                const worker = await Tesseract.createWorker('eng');
                const d = getData();
                const allParsed = [];
                for (let i = 0; i < toProcess.length; i++) {
                    const f = toProcess[i];
                    let src = img?.src;
                    if (f) {
                        src = await new Promise((res, rej) => {
                            const r = new FileReader();
                            r.onload = () => res(r.result);
                            r.onerror = rej;
                            r.readAsDataURL(f);
                        });
                    }
                    if (!src || !src.startsWith('data:')) continue;
                    const tmpImg = new Image();
                    tmpImg.src = src;
                    await new Promise(r => { if (tmpImg.complete) r(); else { tmpImg.onload = r; tmpImg.onerror = r; } });
                    const { data: { text } } = await worker.recognize(tmpImg);
                    const parsed = parseProviderTable(text);
                    parsed.forEach(p => { if (!allParsed.some(x => x.key === p.key)) allParsed.push(p); });
                }
                await worker.terminate();
                let updated = 0;
                for (const { key, amount } of allParsed) {
                    d[key] = String(amount);
                    const inp = document.querySelector('.cf-table input[data-key="' + key + '"]');
                    if (inp) { inp.value = formatNum(amount); updated++; }
                }
                saveToStorage(d);
                if (updated) {
                    try { await pushDataToServer(d); } catch (e2) {}
                    await loadData();
                }
                recalcTotals();
                showToast(updated ? updated + ' gateway(s) updated' : 'No match found');
            } catch (e) {
                showToast(e?.message || 'OCR failed', true);
            } finally {
                if (btn) { btn.disabled = false; btn.textContent = 'Submit'; }
            }
        }
        function parseProviderTable(ocrText) {
            const results = [];
            const lines = (ocrText || '').split(/\r?\n/).filter(l => l.trim().length > 3);
            for (const line of lines) {
                let amount = 0;
                const rupeeMatch = line.match(/[Rr₹]\s*([\d,]+\.?\d*)/);
                if (rupeeMatch) {
                    amount = parseNum(rupeeMatch[1]);
                } else {
                    const amtMatches = line.match(/[\d,]+\.?\d*/g);
                    if (amtMatches) {
                        const nums = amtMatches.map(m => ({ raw: m, val: parseNum(m) })).filter(n => n.val > 0);
                        const withComma = nums.find(n => n.raw.includes(','));
                        const big = nums.find(n => n.val >= 1000);
                        amount = (withComma || big || nums[nums.length - 1])?.val || 0;
                    }
                }
                for (const { pattern, key } of PROVIDER_TO_GATEWAY) {
                    if (pattern.test(line) && !results.some(r => r.key === key)) {
                        results.push({ key, amount });
                        break;
                    }
                }
            }
            return results;
        }
        const USER_AGENT_CODES = [7862, 230021, 7864, 7868, 7869, 78610, 78611, 78615, 78616];
        function parseUserTable(ocrText) {
            const results = [];
            const lines = (ocrText || '').split(/\r?\n/).map(l => l.trim()).filter(l => l.length > 2);
            for (let i = 0; i < lines.length; i++) {
                const block = [lines[i], lines[i + 1], lines[i + 2]].filter(Boolean).join(' ');
                let amt = 0;
                const rupeM = block.match(/[Rr₹]\s*([\d,]+\.?\d*)/);
                if (rupeM) amt = parseNum(rupeM[1]);
                if (amt <= 0) {
                    const nums = (block.match(/[\d,]+\.\d{2}/g) || []).map(x => parseNum(x))
                        .filter(v => v >= 0 && !USER_AGENT_CODES.includes(Math.round(v)));
                    amt = nums.length ? nums[nums.length - 1] : 0;
                }
                if (amt > 0 && USER_AGENT_CODES.includes(Math.round(amt))) amt = 0;
                for (const { pattern, key } of PROVIDER_TO_USER) {
                    if (pattern.test(lines[i]) && amt > 0 && !results.some(r => r.key === key)) {
                        results.push({ key, amount: amt });
                        break;
                    }
                }
            }
            return results;
        }
        async function submitUserFromScreenshot() {
            const fileInp = document.getElementById('screenshotInput3');
            const img = document.getElementById('screenshotImg3');
            const files = fileInp?.files;
            let src = img?.src;
            if (files && files.length > 0 && files[0].type.startsWith('image/')) {
                src = await new Promise((res) => {
                    const r = new FileReader();
                    r.onload = () => res(r.result);
                    r.readAsDataURL(files[0]);
                });
            }
            if (!src || !src.startsWith('data:')) {
                showToast('Upload or paste screenshot in User section', true);
                return;
            }
            const btn = document.getElementById('submitUserBtn');
            if (btn) { btn.disabled = true; btn.textContent = 'Reading...'; }
            try {
                if (typeof Tesseract === 'undefined') { showToast('OCR loading, please wait…', true); return; }
                const worker = await Tesseract.createWorker('eng');
                const tmpImg = new Image();
                tmpImg.src = src;
                await new Promise(r => { if (tmpImg.complete) r(); else { tmpImg.onload = r; tmpImg.onerror = r; } });
                const { data: { text } } = await worker.recognize(tmpImg);
                await worker.terminate();
                const parsed = parseUserTable(text);
                const d = getData();
                let updated = 0;
                for (const { key, amount } of parsed) {
                    d[key] = formatNum(amount);
                    const inp = document.querySelector('.cf-table input[data-key="' + key + '"]');
                    if (inp) { inp.value = formatNum(amount); updated++; }
                }
                saveToStorage(d);
                if (updated) {
                    try { await pushDataToServer(d); } catch (e2) {}
                }
                await loadData();
                updateAllNetBalancesAndTotals();
                showToast(updated ? updated + ' user item(s) updated' : 'No match found');
            } catch (e) {
                showToast(e?.message || 'OCR failed', true);
            } finally {
                if (btn) { btn.disabled = false; btn.textContent = 'Submit'; }
            }
        }
        async function pasteScreenshot(section) {
            const suffix = (section === '1') ? '' : section;
            const imgEl = document.getElementById('screenshotImg' + suffix);
            const prevEl = document.getElementById('screenshotPreview' + suffix);
            if (!imgEl || !prevEl) return;
            try {
                const items = await navigator.clipboard.read();
                for (const item of items) {
                    const imgType = item.types.find(t => t.startsWith('image/'));
                    if (imgType) {
                        const blob = await item.getType(imgType);
                        if (!blob) continue;
                        const reader = new FileReader();
                        reader.onload = function() {
                            imgEl.src = reader.result;
                            prevEl.style.display = 'block';
                            showToast('Image pasted');
                        };
                        reader.readAsDataURL(blob);
                        return;
                    }
                }
                showToast('No image found in clipboard', true);
            } catch (e) {
                showToast('Paste failed — Grant clipboard permission', true);
            }
        }
        function clearScreenshot(section) {
            const suffix = (section === '1') ? '' : section;
            const imgEl = document.getElementById('screenshotImg' + suffix);
            const prevEl = document.getElementById('screenshotPreview' + suffix);
            const inpEl = document.getElementById('screenshotInput' + suffix);
            if (imgEl) imgEl.src = '';
            if (prevEl) prevEl.style.display = 'none';
            if (inpEl) inpEl.value = '';
        }
        function attachScreenshotDragDrop() {
            ['1', '2', '3'].forEach(section => {
                const suffix = (section === '1') ? '' : section;
                const zone = document.getElementById('screenshotZone' + suffix);
                const input = document.getElementById('screenshotInput' + suffix);
                if (!zone || !input) return;
                zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('dragover'); });
                zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
                zone.addEventListener('drop', e => {
                    e.preventDefault();
                    zone.classList.remove('dragover');
                    const file = e.dataTransfer.files && e.dataTransfer.files[0];
                    if (file && file.type.startsWith('image/')) {
                        const dt = new DataTransfer();
                        dt.items.add(file);
                        input.files = dt.files;
                        handleScreenshotSelect({ target: input }, section);
                    }
                });
            });
        }
        function showConfirm(msg, onConfirm, opts) {
            opts = opts || {};
            const overlay = document.getElementById('confirmOverlay');
            const msgEl = document.getElementById('confirmModalMsg');
            const okBtn = document.getElementById('confirmModalOk');
            const cancelBtn = document.getElementById('confirmModalCancel');
            msgEl.textContent = msg;
            okBtn.textContent = opts.okText || 'Delete';
            cancelBtn.textContent = opts.cancelText || 'Cancel';
            okBtn.className = 'confirm-btn ' + (opts.danger !== false ? 'danger' : '');
            overlay.classList.add('show');
            const close = () => overlay.classList.remove('show');
            okBtn.onclick = () => { close(); onConfirm && onConfirm(); };
            cancelBtn.onclick = close;
            overlay.onclick = (e) => { if (e.target === overlay) close(); };
        }
        (async function init() {
            await pullFromServer();
            loadData();
        })();
    </script>
    <div id="confirmOverlay" class="confirm-overlay">
        <div class="confirm-modal">
            <p id="confirmModalMsg"></p>
            <div class="confirm-modal-btns">
                <button type="button" class="confirm-btn" id="confirmModalCancel">Cancel</button>
                <button type="button" class="confirm-btn danger" id="confirmModalOk">Delete</button>
            </div>
        </div>
    </div>
